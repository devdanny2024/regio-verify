<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGIO - Video Call</title>
  <style>
    :root {
      --regio-green:       #90ab4c;
      --regio-green-hover: #7d9642;
      --regio-dark-green:  #4d603a;
      --text-dark:   #333333;
      --text-light:  #666666;
      --border-color:#dddddd;
      --card-bg:     #ffffff;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-dark);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f4f4f4;
      background-image:
        linear-gradient(45deg, #eeeeee 25%, transparent 25%, transparent 75%, #eeeeee 75%, #eeeeee),
        linear-gradient(45deg, #eeeeee 25%, transparent 25%, transparent 75%, #eeeeee 75%, #eeeeee);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }

    h1   { font-size: 20px; margin: 0 0 10px; font-weight: normal; }
    .countdown { font-size: 24px; font-weight: bold; margin: 15px 0; font-variant-numeric: tabular-nums; }

    .btn {
      background-color: var(--regio-green);
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s;
    }
    .btn:hover    { background-color: var(--regio-green-hover); }
    .btn:disabled { background-color: #cccccc; cursor: not-allowed; }

    /* Terminal error screen */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      max-width: 500px;
      width: 100%;
      padding: 30px;
      text-align: center;
    }

    /* Main two-column call card */
    #app-card {
      max-width: 900px;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: row;
      min-height: 500px;
    }

    .video-section {
      flex: 2;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      background: #000;
    }
    .video-wrapper { flex: 1; position: relative; width: 100%; height: 100%; min-height: 350px; }

    video#remote-video { width: 100%; height: 100%; object-fit: contain; }
    video#local-video  {
      position: absolute; bottom: 15px; right: 15px;
      width: 120px; height: 90px;
      object-fit: cover;
      border: 2px solid white;
      background: #333;
    }

    .partner-info {
      background: var(--card-bg);
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
      border-top: 1px solid var(--border-color);
    }

    .info-section {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 30px 25px;
      gap: 10px;
    }

    .regio-logo { max-width: 160px; height: auto; margin-bottom: 10px; }
    .why-title  { font-size: 16px; font-weight: bold; color: var(--regio-dark-green); margin: 0; }
    .why-text   { font-size: 13px; color: var(--text-light); line-height: 1.5; margin: 0 0 10px; }

    #info-block { width: 100%; }
    #t-message  { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }

    /* In-call round icon buttons */
    #call-controls {
      display: none;
      justify-content: center;
      gap: 16px;
      width: 100%;
      margin-top: auto;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      width: 56px;
      height: 56px;
      border-radius: 50%;
    }
    .icon-btn img { width: 100%; height: 100%; display: block; }

    @media (max-width: 768px) {
      #app-card        { flex-direction: column; min-height: auto; }
      .video-section   { border-right: none; border-bottom: 1px solid var(--border-color); }
      .video-wrapper   { min-height: 260px; }
    }
  </style>
</head>
<body>

  <!-- Terminal error screen: invalid link, missed, too early -->
  <div class="card" id="error-card" style="display:none">
    <h1 id="t-title"></h1>
    <p id="t-message"></p>
  </div>

  <!-- Main call card: waiting / ready / connecting / live -->
  <div id="app-card">
    <div class="video-section">
      <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video"  autoplay playsinline muted></video>
      </div>
      <div class="partner-info">
        <span id="t-partner-label"></span>&nbsp;<span id="partner-name"></span>
      </div>
    </div>

    <div class="info-section">
      <img class="regio-logo" src="/logo-regio.png" alt="REGIO">
      <h2 class="why-title" id="t-why-title"></h2>
      <p class="why-text" id="t-why-text"></p>

      <div id="info-block">
        <div class="countdown" id="countdown-display">--:--</div>
        <p id="t-status-message"></p>
        <button id="btn-join" class="btn" disabled>
          <span id="t-button"></span>
        </button>
      </div>

      <div id="call-controls">
        <button id="btn-sound"  class="icon-btn"><img id="icon-sound"  src="/icons/SoundOn.png" alt=""></button>
        <button id="btn-camera" class="icon-btn"><img id="icon-camera" src="/icons/CamOn.png"   alt=""></button>
        <button id="btn-mic"    class="icon-btn"><img id="icon-mic"    src="/icons/MicOn.png"    alt=""></button>
        <button id="btn-hangup" class="icon-btn"><img src="/icons/EndCall.png" alt=""></button>
      </div>
    </div>
  </div>

  <script src="/bundle.js"></script>
</body>
</html>
